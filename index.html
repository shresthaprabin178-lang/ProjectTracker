<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 font-sans antialiased">

    <div class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                <i data-lucide="layers" class="w-5 h-5"></i>
            </div>
            <span class="font-bold dark:text-white">NEXUS</span>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-slate-600 dark:text-slate-300">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 transform -translate-x-full md:translate-x-0 md:static md:flex transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-6 hidden md:flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="layers" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold dark:text-white">NEXUS</span>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto pt-4 md:pt-0">
                <a href="#" class="nav-item active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="#" class="nav-item" data-view="projects"><i data-lucide="briefcase"></i> Projects</a>
                <a href="#" class="nav-item" data-view="team"><i data-lucide="users"></i> Team</a>
                <a href="#" class="nav-item" data-view="contractors"><i data-lucide="hard-hat"></i> Contractors</a>
                <a href="#" class="nav-item" data-view="analytics"><i data-lucide="bar-chart-3"></i> Analytics</a>
            </nav>

            <div class="p-4 border-t border-slate-200 dark:border-slate-700 space-y-2">
                <button id="theme-toggle" class="flex items-center gap-3 px-4 py-3 w-full text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all">
                    <i data-lucide="moon" class="dark:hidden"></i>
                    <i data-lucide="sun" class="hidden dark:block"></i>
                    <span>Theme</span>
                </button>
                <div class="flex items-center gap-3 px-4 py-2 border-t border-slate-100 dark:border-slate-700 mt-2">
                    <img src="https://ui-avatars.com/api/?name=Alex+Rivera" class="w-8 h-8 rounded-full">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold dark:text-white truncate">Alex Rivera</p>
                    </div>
                </div>
            </div>
        </aside>

        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-30 hidden transition-opacity duration-300 opacity-0"></div>

        <main class="flex-1 overflow-y-auto custom-scrollbar">
            <header class="hidden md:flex sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-8 py-4 items-center justify-between">
                <div class="flex items-center bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-full w-96 border border-transparent focus-within:border-indigo-500">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    <input type="text" placeholder="Search..." class="bg-transparent border-none focus:ring-0 text-sm ml-2 w-full dark:text-white">
                </div>
                <div class="flex items-center gap-4">
                    <i data-lucide="bell" class="text-slate-500 cursor-pointer"></i>
                    <i data-lucide="settings" class="text-slate-500 cursor-pointer"></i>
                </div>
            </header>

            <section id="view-dashboard" class="p-4 md:p-8 space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold dark:text-white">Overview</h1>
                        <p class="text-slate-500 text-sm">Managing 48 projects across 3 regions.</p>
                    </div>
                    <button class="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-xl font-medium shadow-md flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> New Project
                    </button>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="stat-card">
                        <p class="text-slate-500 text-xs font-medium uppercase">Active Projects</p>
                        <p class="text-2xl font-bold dark:text-white mt-1">24</p>
                        <div class="mt-2 text-xs text-emerald-500 font-medium">↑ 12% vs last month</div>
                    </div>
                    </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="chart-container overflow-hidden">
                        <h3 class="font-bold mb-4 dark:text-white text-sm">Project Progress</h3>
                        <div class="h-64"><canvas id="budgetChart"></canvas></div>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between">
                        <h3 class="font-bold dark:text-white">Active Tasks</h3>
                    </div>
                    <div class="overflow-x-auto overflow-y-hidden">
                        <table class="w-full text-left min-w-[600px]">
                            </table>
                    </div>
                    <div class="md:hidden p-3 text-center text-[10px] text-slate-400 uppercase tracking-widest bg-slate-50 dark:bg-slate-900">
                        Swipe horizontally to view more
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Nepal Project Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 hidden md:flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="layers" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight dark:text-white">NEXUS</span>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" class="nav-item active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="#" class="nav-item" data-view="projects"><i data-lucide="briefcase"></i> Projects</a>
                <a href="#" class="nav-item" data-view="team"><i data-lucide="users"></i> Team</a>
                <a href="#" class="nav-item" data-view="contractors"><i data-lucide="hard-hat"></i> Contractors</a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-700">
                <button id="theme-toggle" class="flex items-center gap-3 px-4 py-2 w-full text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all">
                    <i data-lucide="moon" class="dark:hidden"></i>
                    <i data-lucide="sun" class="hidden dark:block"></i>
                    <span>Appearance</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative custom-scrollbar">
            <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-8 py-4 flex items-center justify-between">
                <h2 class="text-lg font-bold dark:text-white" id="view-title">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-sm font-semibold dark:text-white">Admin User</p>
                        <p class="text-xs text-slate-500">Kathmandu, NP</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" class="w-10 h-10 rounded-full border-2 border-indigo-100">
                </div>
            </header>

            <section id="main-content" class="p-8 space-y-8 animate-fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="stats-grid">
                    </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 chart-container h-80">
                        <h3 class="font-bold mb-4 dark:text-white text-sm">Budget Analysis (NPR)</h3>
                        <canvas id="budgetChart"></canvas>
                    </div>
                    <div class="chart-container h-80">
                        <h3 class="font-bold mb-4 dark:text-white text-sm">Status Distribution</h3>
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
                    <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                        <h3 class="font-bold dark:text-white">Project List</h3>
                        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">+ Add Project</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-700/50 text-slate-500 text-xs uppercase font-semibold">
                                <tr>
                                    <th class="px-6 py-4">Project ID</th>
                                    <th class="px-6 py-4">Name</th>
                                    <th class="px-6 py-4">Est. Amount</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Progress</th>
                                </tr>
                            </thead>
                            <tbody id="project-table-body" class="divide-y divide-slate-100 dark:divide-slate-700 dark:text-slate-300">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
